<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8">
  <title>EZDine POS</title>
  <!-- We'll use a very simple CSS for the native wrapper -->
  <style>
    body,
    html {
      margin: 0;
      padding: 0;
      height: 100vh;
      width: 100vw;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background-color: #f8fafc;
      display: flex;
      flex-direction: column;
    }

    #native-header {
      height: 32px;
      background-color: #1e293b;
      color: #f1f5f9;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 16px;
      font-size: 13px;
      flex-shrink: 0;
      border-bottom: 1px solid #1e293b;
      -webkit-app-region: drag;
    }

    .brand-section {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .ip-badge {
      background-color: #0ea5e9;
      color: white;
      padding: 4px 10px;
      border-radius: 8px;
      font-weight: 700;
      font-size: 11px;
      letter-spacing: 0.5px;
      -webkit-app-region: no-drag;
    }

    .version-tag {
      font-size: 10px;
      color: #94a3b8;
      font-weight: 600;
      letter-spacing: 1px;
    }

    .update-btn {
      background: #1e293b;
      color: #cbd5e1;
      border: 1px solid #334155;
      padding: 4px 12px;
      border-radius: 8px;
      font-size: 11px;
      font-weight: 600;
      cursor: pointer;
      -webkit-app-region: no-drag;
      transition: all 0.2s;
    }

    .update-btn:hover {
      background: #334155;
      color: white;
    }

    .brand {
      font-weight: 900;
      letter-spacing: 1.5px;
      font-size: 14px;
      color: #ffffff;
    }

    #app-frame {
      flex: 1;
      width: 100%;
      border: none;
    }
  </style>
</head>

<body>
  <div id="native-header">
    <div class="brand-section">
      <div class="brand">EZDINE POS</div>
      <div class="version-tag" id="version-display">v...</div>
    </div>
    <div style="display: flex; align-items: center; gap: 16px;">
      <div>
        <span style="color: #94a3b8; font-size: 11px; font-weight: 500;">Bridge: </span>
        <span id="ip-display" class="ip-badge">Loading...</span>
      </div>
      <button class="update-btn" onclick="checkUpdates()">Check for Updates</button>
    </div>
  </div>

  <!-- Load the Next.js app inside a native webview to preserve local storage safely -->
  <webview id="app-frame" partition="persist:ezdine" allowpopups></webview>

  <script>
    async function init() {
      // Get the absolute path to preload.js via the bridge info
      const info = await window.bridgeAPI.getBridgeInfo();
      const webview = document.getElementById('app-frame');
      const updateBtn = document.querySelector('.update-btn');

      // Update UI with native info
      document.getElementById('version-display').innerText = `v${info.appVersion || '???'}`;
      document.getElementById('ip-display').innerText = info.url;

      // Subscribe to update status
      window.bridgeAPI.onUpdateStatus((status, data) => {
        console.log('Native Update Status:', status, data);
        switch (status) {
          case 'checking':
            updateBtn.innerText = 'Checking...';
            updateBtn.disabled = true;
            break;
          case 'available':
            updateBtn.innerText = `Update Found: v${data}`;
            updateBtn.style.background = '#059669'; // Greenish
            break;
          case 'uptodate':
            updateBtn.innerText = 'App is Up to Date';
            updateBtn.disabled = false;
            setTimeout(() => { updateBtn.innerText = 'Check for Updates'; }, 3000);
            break;
          case 'downloading':
            updateBtn.innerText = `Downloading: ${data}%`;
            updateBtn.disabled = true;
            break;
          case 'downloaded':
            updateBtn.innerText = 'Installing Update...';
            updateBtn.style.background = '#2563eb'; // Blue
            break;
          case 'error':
            updateBtn.innerText = 'Update Error';
            updateBtn.title = data;
            updateBtn.disabled = false;
            setTimeout(() => { updateBtn.innerText = 'Check for Updates'; }, 3000);
            break;
        }
      });

      // Set the preload attribute before setting the src
      if (info.preloadPath) {
        webview.setAttribute('preload', info.preloadPath);
      }

      webview.src = info.appUrl;
    }

    function checkUpdates() {
      window.bridgeAPI.checkForUpdates();
    }
    init();
  </script>
</body>

</html>
